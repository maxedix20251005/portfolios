<svg id="wf-mobile" width="1200" height="920" viewBox="0 0 1200 920" xmlns="http://www.w3.org/2000/svg"
                role="img" aria-label="スマートフォン版ワイヤーフレーム（TOPページとデジタル調香ページ）">

<style>
  .wf-footer-bg { fill: #1f1f1f; }
  .wf-footer-text { font-family: Arial, sans-serif; font-size: 10px; fill: #eaeaea; }
  .wf-footer-text text { fill: #eaeaea; }
</style>

                <!-- Left smartphone: TOP page -->
                <g transform="translate(70,40)">
                  <rect x="0" y="0" width="460" height="840" rx="42" fill="#f2f2f2" stroke="#9d9d9d" stroke-width="4" />
                  <rect x="20" y="20" width="420" height="800" rx="32" fill="#ffffff" stroke="#d0d0d0"
                    stroke-width="2" />
                  <rect x="175" y="10" width="110" height="12" rx="6" fill="#b6b6b6" />

                  <text x="38" y="58" font-family="Arial,sans-serif" font-size="15" font-weight="700"
                    fill="#303030">TOPページ</text>
                  <rect x="28" y="70" width="404" height="58" rx="10" fill="#f7f7f7" stroke="#bdbdbd"
                    stroke-width="2" />
                  <text x="44" y="106" font-family="Arial,sans-serif" font-size="13" fill="#636363">ロゴ / 検索 / カート</text>

                  <rect x="28" y="142" width="404" height="172" rx="12" fill="#e9e9e9" stroke="#a6a6a6"
                    stroke-width="2" />
                  <text x="230" y="234" text-anchor="middle" font-family="Arial,sans-serif" font-size="14"
