                  <rect x="590" y="74" width="20" height="772" rx="10" fill="#bdbdbd" />
                  <line x1="592" y1="84" x2="592" y2="836" stroke="#ededed" stroke-width="2" opacity="0.85" />
                  <line x1="607" y1="84" x2="607" y2="836" stroke="#6d6d6d" stroke-width="2" opacity="0.7" />
                </g>

                <!-- Right smartphone: Digital perfumery page -->
                <g transform="translate(670,40)">
                  <rect x="0" y="0" width="460" height="840" rx="42" fill="#f2f2f2" stroke="#9d9d9d" stroke-width="4" />
                  <rect x="20" y="20" width="420" height="800" rx="32" fill="#ffffff" stroke="#d0d0d0"
                    stroke-width="2" />
                  <rect x="175" y="10" width="110" height="12" rx="6" fill="#b6b6b6" />

                  <text x="38" y="58" font-family="Arial,sans-serif" font-size="15" font-weight="700"
