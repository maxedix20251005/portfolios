                  <rect x="28" y="136" width="404" height="64" rx="10" fill="#ffffff" stroke="#bdbdbd"
                    stroke-width="2" />
                  <text x="44" y="174" font-family="Arial,sans-serif" font-size="12" fill="#666">操作説明（スクロール・ドラッグ）</text>

                  <rect x="28" y="214" width="404" height="236" rx="14" fill="#e9e9e9" stroke="#9f9f9f"
                    stroke-width="2" />
                  <text x="230" y="334" text-anchor="middle" font-family="Arial,sans-serif" font-size="14"
                    fill="#555">Color + Particle Canvas</text>

                  <rect x="28" y="464" width="404" height="204" rx="12" fill="#f7f7f7" stroke="#b5b5b5"
