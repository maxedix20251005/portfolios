                  <rect x="44" y="510" width="88" height="36" rx="8" fill="#fff" stroke="#bbb" stroke-width="2" />
                  <rect x="140" y="510" width="88" height="36" rx="8" fill="#fff" stroke="#bbb" stroke-width="2" />
                  <rect x="236" y="510" width="88" height="36" rx="8" fill="#fff" stroke="#bbb" stroke-width="2" />
                  <rect x="332" y="510" width="96" height="36" rx="8" fill="#fff" stroke="#bbb" stroke-width="2" />
                  <text x="88" y="533" text-anchor="middle" font-family="Arial,sans-serif" font-size="11"
                    fill="#666">Mood A</text>
                  <text x="184" y="533" text-anchor="middle" font-family="Arial,sans-serif" font-size="11"
                    fill="#666">Mood B</text>
                  <text x="280" y="533" text-anchor="middle" font-family="Arial,sans-serif" font-size="11"
                    fill="#666">Mood C</text>
                  <text x="380" y="533" text-anchor="middle" font-family="Arial,sans-serif" font-size="11"
                    fill="#666">Color Wheel</text>
                  <text x="44" y="574" font-family="Arial,sans-serif" font-size="11" fill="#666">Speed（広がり）</text>
                  <rect x="44" y="580" width="172" height="10" rx="5" fill="#fff" stroke="#bbb" stroke-width="2" />
                  <rect x="120" y="574" width="24" height="22" rx="5" fill="#ececec" stroke="#aaa" stroke-width="2" />
                  <rect x="242" y="578" width="174" height="44" rx="10" fill="#ffd966" stroke="#777" stroke-width="2" />
                  <text x="329" y="606" text-anchor="middle" font-family="Arial,sans-serif" font-size="12"
                    fill="#555">この香りを見る</text>

                  <rect x="28" y="682" width="404" height="130" rx="12" fill="#ffffff" stroke="#bdbdbd"
                    stroke-width="2" />
                  <text x="44" y="718" font-family="Arial,sans-serif" font-size="13" font-weight="700"
                    fill="#4a4a4a">あなたの香り（結果）</text>
                  <rect x="242" y="748" width="80" height="40" rx="10" fill="#fff" stroke="#777" stroke-width="2" />
                  <text x="282" y="773" text-anchor="middle" font-family="Arial,sans-serif" font-size="12"
                    fill="#666">保存</text>
                  <rect x="332" y="748" width="84" height="40" rx="10" fill="#ffd966" stroke="#777" stroke-width="2" />
                  <text x="374" y="773" text-anchor="middle" font-family="Arial,sans-serif" font-size="12"
                    fill="#555">実店舗体験へ</text>
