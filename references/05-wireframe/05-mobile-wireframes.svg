                    <text x="152" y="752" font-size="10">TOP</text>
                    <text x="232" y="752" font-size="10">マイアカウント</text>
                    <text x="42" y="772" font-size="10">配送・送料 / 返品 / お支払い / お問い合わせ</text>
                    <text x="230" y="800" text-anchor="middle" font-size="9">inim-dx wireframe document</text>
                  </g>
                </g>

                <!-- Divider -->
                <g aria-hidden="true">
