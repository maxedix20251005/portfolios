                  <text x="44" y="505" font-family="Arial,sans-serif" font-size="13" font-weight="700"
                    fill="#464646">体験の流れ</text>
                  <text x="44" y="532" font-family="Arial,sans-serif" font-size="12" fill="#666">STEP1 → STEP2 →
